# LastCheck — Transaction Rules
#
# Evaluated top-to-bottom, first match wins.
# Default action when nothing matches is REJECT (default-deny).
#
# See rules.md for the full variable reference and caveats.

allowlist:
  # Contracts the watcher is willing to interact with.
  # Use the wildcard "all" to allow any destination.
  contracts:
    - "0x156d1abd1f207f73a6ef13ef22e862fc141156bd"

blocklist:
  # Hard-blocked addresses — any tx touching these is rejected immediately.
  addresses: []

token_caps: []

rules:

  # 1. Hard-block anything on the blocklist, no exceptions.
  - id: block_blocklisted
    description: Hard-reject transactions to blocklisted addresses
    condition: "to in blocklist.addresses"
    action: reject

  # 2. Block unlimited ERC-20 approvals to anything not on the allowlist.
  #    This is the classic drainer pattern — worth keeping even with a
  #    permissive allowlist.
  - id: block_unlimited_approval_unknown
    description: Block unlimited ERC-20 approval to unknown spender
    condition: "is_erc20_approval and approval_amount == max_uint256 and spender not in allowlist.contracts"
    action: reject

  # 3. Hand allowlisted txs to the AI layer for review.
  #    The watcher parks these in `awaiting_ai` status; an MCP client
  #    (Claude Code, Claude Desktop, etc.) then decides approve/reject.
  #    Change action to `approve` for an auto-approve allowlist without
  #    AI review.
  - id: confirm_allowlisted
    description: Hand allowlisted transactions to AI for review
    condition: "to in allowlist.contracts"
    action: confirm

  # Nothing else is approved — default-deny takes over.
